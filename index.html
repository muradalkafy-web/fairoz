<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | نظام فيروز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, #0f9d58, #08663a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .login-card {
        background: white;
        padding: 40px 30px;
        border-radius: 20px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .logo-icon {
        font-size: 50px;
        color: #0f9d58;
        margin-bottom: 15px;
    }

    h2 { margin: 0 0 25px 0; color: #333; font-size: 22px; }

    .input-group {
        position: relative;
        margin-bottom: 20px;
        text-align: right;
    }

    .input-group i {
        position: absolute;
        top: 50%;
        right: 15px;
        transform: translateY(-50%);
        color: #aaa;
        transition: 0.3s;
    }

    input {
        width: 100%;
        padding: 14px 45px 14px 15px;
        border: 2px solid #eee;
        border-radius: 12px;
        font-family: 'Cairo';
        font-size: 15px;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #0f9d58;
    }
    
    input:focus + i { color: #0f9d58; }

    button {
        width: 100%;
        padding: 14px;
        background: #0f9d58;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        font-family: 'Cairo';
    }

    button:hover { background: #0b7a43; transform: scale(1.02); }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
        color: #e74c3c;
        font-size: 13px;
        margin-top: 15px;
        min-height: 20px;
        font-weight: 600;
    }
</style>
</head>

<body>

<div class="login-card">
    <i class="fas fa-book-open logo-icon"></i>
    <h2>نظام فيروز</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <i class="fas fa-user"></i>
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="كلمة المرور">
        <i class="fas fa-lock"></i>
    </div>

    <button id="loginBtn" onclick="performLogin()">تسجيل الدخول</button>
    <div id="errorBox" class="error-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "firoz-system.firebaseapp.com",
        databaseURL: "https://firoz-system-default-rtdb.firebaseio.com",
        projectId: "firoz-system"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // دالة إنشاء الأدمن تلقائياً (تعمل مرة واحدة فقط)
    async function initAdmin() {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        if (!snapshot.exists()) {
            await push(usersRef, {
                username: "admin",
                password: "1234",
                role: "admin"
            });
            console.log("✅ تم إنشاء حساب المدير الافتراضي");
        }
    }
    initAdmin();

    // دالة تسجيل الدخول الرئيسية
    window.performLogin = async function() {
        const userIn = document.getElementById("username");
        const passIn = document.getElementById("password");
        const btn = document.getElementById("loginBtn");
        const errBox = document.getElementById("errorBox");

        const username = userIn.value.trim();
        const password = passIn.value;

        // تنظيف الأخطاء السابقة
        errBox.innerText = "";
        
        if (!username || !password) {
            errBox.innerText = "⚠️ يرجى إدخال الاسم وكلمة المرور";
            return;
        }

        // تعطيل الزر لمنع التكرار
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

        try {
            const snapshot = await get(ref(db, 'users'));
            
            if (!snapshot.exists()) {
                throw new Error("لا يوجد مستخدمين في النظام");
            }

            let foundUser = null;

            // البحث عن المستخدم
            snapshot.forEach((childSnapshot) => {
                const user = childSnapshot.val();
                if (user.username === username && user.password === password) {
                    foundUser = user;
                }
            });

            if (foundUser) {
                // ✅✅✅ الحفظ الصحيح للبيانات ✅✅✅
                localStorage.setItem("role", foundUser.role);
                localStorage.setItem("username", foundUser.username); // ضروري لسجل العمليات
                localStorage.setItem("user", foundUser.username);     // للتوافق مع الكود القديم

                // توجيه مباشر وسريع
                window.location.href = "dashboard.html";
            } else {
                errBox.innerText = "❌ بيانات الدخول غير صحيحة";
                btn.disabled = false;
                btn.innerText = "تسجيل الدخول";
            }

        } catch (error) {
            console.error(error);
            errBox.innerText = "❌ حدث خطأ في الاتصال";
            btn.disabled = false;
            btn.innerText = "تسجيل الدخول";
        }
    }

    // تفعيل زر Enter
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performLogin();
        }
    });
</script>

</body>
</html>
