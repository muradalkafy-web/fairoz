<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام فيروز</title>

<style>
.selected-card {
  background: #c8f7c5 !important; /* أخضر واضح */
  border: 2px solid #28a745;
  box-shadow: 0 0 10px rgba(40,167,69,0.5);
}
body {
  margin:0;
  font-family: Tahoma;
  background:#f4f7f6;
}

/* HEADER */
header {
  background:#0f9d58;
  color:white;
  padding:14px;
  font-size:18px;
  text-align:center;
}

/* DASHBOARD */
.dashboard {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.box {
  background:white;
  padding:12px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* SEARCH + FILTER */
.filter {
  padding:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* CARDS */
.container {
  padding:10px;
}

.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  border-right:4px solid #0f9d58;
}

/* TEXT */
.code {
  color:#0f9d58;
  font-weight:bold;
  font-size:12px;
  margin-bottom:4px;
}

.name {
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.name:hover {
  color:#0f9d58;
}

.status {
  font-weight:bold;
  margin:6px 0;
}

/* BUTTONS */
.buttons {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:5px;
  margin-top:8px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  background:#e0e0e0;
  color:#333;
  transition:0.2s;
}

/* عند المرور */
button:hover {
  background:#0f9d58;
  color:white;
}

/* الزر النشط */
.active-filter {
  background:#0f9d58 !important;
  color:white !important;
  font-weight:bold;
}

.call {background:#2196f3;}
.appointment {background:#ff9800;}
.visit {background:#9c27b0;}
.deal {background:#4caf50;}
.reject {background:#f44336;}
.pending {background:#607d8b;}
.back-btn {
  position:absolute;
  right:10px;
  top:10px;
  width:40px;
  height:40px;
  background:white;
  border:none;
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  transition:0.2s;
}

.back-btn:active {
  transform:scale(0.9);
}

.arrow {
  border: solid #0f9d58;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 6px;
  transform: rotate(135deg);
}
</style>
</head>

<body>

<header style="position:relative">

<button onclick="goBack()" class="back-btn">
  <span class="arrow"></span>
</button>
📚 نظام مطبعة فيروز
<button id="deleteBtn" onclick="handleDeleteClick()" style="
position:absolute;
left:10px;
top:10px;
background:#f44336;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
font-size:13px;
cursor:pointer;
display:none;
">
🗑️
</button>

</header>
<button onclick="exportExcel()" style="
margin:10px;
width:90%;
padding:12px;
background:#4caf50;
color:white;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
cursor:pointer;
">
📥 تحميل Excel
</button>
<!-- DASHBOARD -->
<div class="dashboard">
  <div class="box">📊 الكل: <span id="total">0</span></div>
  <div class="box">☎️ اتصالات: <span id="calls">0</span></div>
  <div class="box">🚗 زيارات: <span id="visits">0</span></div>
  <div class="box">🤝 اتفاقات: <span id="deals">0</span></div>
</div>


<div class="filter">
<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">

<button class="filter-btn" onclick="setStatusFilter('all')">الكل</button>
<button class="filter-btn" onclick="setStatusFilter('new')">جديدة</button>
<button class="filter-btn" onclick="setStatusFilter('called')">اتصال</button>
<button class="filter-btn" onclick="setStatusFilter('appointment')">موعد</button>
<button class="filter-btn" onclick="setStatusFilter('visited')">زيارة</button>
<button class="filter-btn" onclick="setStatusFilter('deal')">اتفاق</button>
<button class="filter-btn" onclick="setStatusFilter('reject')">رفض</button>
<button class="filter-btn" onclick="setStatusFilter('pending')">انتظار</button>

</div>
<input id="searchInput" placeholder="🔍 بحث (اسم / كود / رقم)">

<select id="teamFilter">
  <option value="all">كل الفرق</option>
  <option value="A">فريق A</option>
  <option value="B">فريق B</option>
</select>

</div>

<!-- LIST -->
<div class="container" id="schoolsList"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, onValue, update, push } 
from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "firoz-system.firebaseapp.com",
  databaseURL: "https://firoz-system-default-rtdb.firebaseio.com",
  projectId: "firoz-system"
};

const app = initializeApp(firebaseConfig);
// 🔒 حماية + صلاحيات
const role = localStorage.getItem("role");

if(!role){
  location.href = "index.html";
}

// 👇 هذه صفحة المدارس (operator + admin فقط)
if(role !== "admin" && role !== "operator"){

  location.href = "dashboard.html";
}
const db = getDatabase(app);
const params = new URLSearchParams(window.location.search);
const selectedStatus = params.get("status");
let dataAll = {};
let selected = [];
let deleteMode = false;
let currentStatus = selectedStatus || "all";
onValue(ref(db,'schools'), (snap)=>{
  dataAll = snap.val() || {};
  render();
});

document.getElementById("teamFilter").onchange = render;
document.getElementById("searchInput").oninput = render;

function render(){

  const search = document.getElementById("searchInput").value.toLowerCase();
  const filter = document.getElementById("teamFilter").value;
  const container = document.getElementById("schoolsList");

let total=0, calls=0, visits=0, deals=0, appointments=0;

  container.innerHTML="";

  for(let id in dataAll){
    
const s = dataAll[id];
if(s.deleted) continue;
// 🔥 فلترة حسب الحالة (هذا المهم)
if(currentStatus !== "all"){
  if(s.status !== currentStatus) continue;
}

let buttonsHTML = "";


 // تنظيف النص
function clean(text){
  return String(text)
    .toLowerCase()
    .replace(/[\s\-]/g,'') // يشيل المسافات والـ -
}

// القيم
const name = clean(s.name);
const code = clean(s.code);
const phone = clean(s.phone);
const searchClean = clean(search);

// البحث الذكي
if(searchClean &&
   !name.includes(searchClean) &&
   !code.includes(searchClean) &&
   !phone.includes(searchClean)
) continue;

    if(filter !== "all" && s.team !== filter) continue;

    total++;

    if(s.status==="called") calls++;
    if(s.status==="appointment") appointments++;
    if(s.status==="visited") visits++;
    if(s.status==="deal") deals++;

    container.innerHTML += `
   <div class="card ${selected.includes(id) ? 'selected-card' : ''}" 
onclick="handleCardClick('${id}')">
      <div class="code">${s.code ? s.code : id}</div>

  <div class="name"onclick="event.stopPropagation(); handleCardClick('${id}')">
        ${s.name}
      </div>

      <div>📞 ${s.phone}</div>
      <div>👥 ${s.team}</div>
      <div class="status">📊 ${translate(s.status)}</div>
<div class="buttons" onclick="event.stopPropagation()">
  ${buttonsHTML}
</div>
    `;
  }

  document.getElementById("total").innerText=total;
  document.getElementById("calls").innerText=calls;
  document.getElementById("visits").innerText=visits;
  document.getElementById("deals").innerText=deals;
// 🔥 التحكم بزر الحذف
const btn = document.getElementById("deleteBtn");

if(btn){
  btn.style.display = "block"; // دائماً ظاهر
  btn.style.background = deleteMode ? "#000" : "#f44336";
}
}
window.setStatusFilter = function(status){

  currentStatus = status;

  // إزالة التفعيل من الكل
  document.querySelectorAll(".filter-btn").forEach(btn=>{
    btn.classList.remove("active-filter");
  });

  // تفعيل الزر المضغوط
  event.target.classList.add("active-filter");

  render();
}
window.handleDeleteClick = function(){

  // 🔥 أول ضغطة → دخول وضع التحديد
  if(!deleteMode){
    deleteMode = true;
    render();
    return;
  }

  // 🔥 داخل وضع التحديد وماكو تحديد → إلغاء
  if(selected.length === 0){
    deleteMode = false;
    render();
    return;
  }

  // 🔥 داخل وضع التحديد وعندك عناصر → حذف
  if(!confirm("متأكد تريد تحذف؟")) return;

  selected.forEach(id=>{
    update(ref(db,'schools/'+id),{
      deleted: true
    });
  });

  selected = [];
  deleteMode = false;

  render();
}
window.openDetails = function(id){
  location.href = "school-details.html?id=" + id;
}

function translate(s){
  if(s==="new") return "جديدة";
  if(s==="called") return "تم الاتصال";
  if(s==="appointment") return "موعد";
  if(s==="visited") return "تمت الزيارة";
  if(s==="deal") return "اتفاق";
  if(s==="reject") return "مرفوض";
  if(s==="pending") return "قيد الانتظار";
  return s;
}
window.handleCardClick = function(id){

  if(deleteMode){
    toggleSelect(id);
  } else {
    openDetails(id);
  }

}
window.toggleSelect = function(id){

  if(selected.includes(id)){
    selected = selected.filter(x => x !== id);
  } else {
    selected.push(id);
  }

  render();
}
window.goBack = function(){
  location.href = "dashboard.html";
}
window.exportExcel = function(){
const order = {
  new: 1,
  called: 2,
  appointment: 3,
  visited: 4,
  deal: 5,
  reject: 6,
  pending: 7
};
  let rows = [];

for(let id in dataAll){

const s = dataAll[id];

// 🔥 هنا بالضبط
if(s.deleted) continue;

    // 🔥 تحويل السجل إلى نص
    let historyText = "";

    if(s.history){
      Object.values(s.history).forEach(h=>{
        historyText += `${h.time} - ${h.user} - ${h.action}\n`;
      });
    }

    rows.push({
        "_order": order[s.status] || 99,
      "الكود": s.code || id,
      "اسم المدرسة": s.name || "",
      "رقم الهاتف": s.phone || "",
      "المسؤول": s.manager || "",
      "عدد الطلاب": s.students || "",
      "الفريق": s.team || "",
      "العنوان": s.address || "",
      "الموقع": s.location || "",
      "الحالة": translate(s.status),
      "السجل الكامل": historyText
    });

  }
rows.sort((a, b) => a._order - b._order);
rows = rows.map(r => {
  delete r._order;
  return r;
});
  const ws = XLSX.utils.json_to_sheet(rows);

  ws['!cols'] = [
    {wch:10},{wch:20},{wch:15},{wch:20},
    {wch:10},{wch:10},{wch:25},{wch:25},
    {wch:15},{wch:80}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "المدارس");

  XLSX.writeFile(wb, "schools.xlsx");
}

window.deleteSelected = function(){

  // 🔥 لازم يكون داخل وضع الحذف
  if(!deleteMode){
    alert("فعّل وضع الحذف أولاً");
    return;
  }

  if(selected.length === 0){
    alert("ماكو تحديد");
    return;
  }

  if(!confirm("متأكد تريد تحذف؟")) return;

  selected.forEach(id=>{
    update(ref(db,'schools/'+id),{
      deleted: true
    });
  });

  selected = [];
  deleteMode = false;

  render();
}
</script>

</body>
</html>
