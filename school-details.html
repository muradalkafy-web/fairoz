<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="viewport" content="width=device-width">
<title>تفاصيل المدرسة</title>

<style>
  .whatsapp-action {
  background: #25d366 !important;
  color: white;
  font-weight: bold;
}

.whatsapp-action:hover {
  background: #1ebe5d !important;
}
  .whatsapp-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 55px;
  height: 55px;
  background: #25d366;
  color: white;
  font-size: 28px;
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  z-index:1000;
  transition:0.3s;
}

.whatsapp-btn:hover {
  transform: scale(1.1);
  background:#1ebe5d;
}
  textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  background:#f9f9f9;
  font-size:14px;
  margin-bottom:10px;
}
body {
  margin:0;
  font-family:Tahoma;
  background:#f4f7f6;
}

header {
  background:#0f9d58;
  color:white;
  padding:14px;
  text-align:center;
  font-size:18px;
}

/* CONTAINER */
.container {padding:10px;}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* TITLE */
.section-title {
  font-weight:bold;
  margin-bottom:8px;
  color:#0f9d58;
}

/* ROW */
.row {
  margin:5px 0;
  font-size:14px;
}

/* NAME */
.name {
  font-size:20px;
  font-weight:bold;
  margin:5px 0;
}

/* STATUS */
.status {
  font-weight:bold;
  padding:5px 10px;
  border-radius:8px;
  display:inline-block;
  color:white;
}

.actions {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.actions a {
  flex:1;
  text-align:center;
  padding:12px;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

.actions a:first-child {
  background:#4caf50; /* اتصال */
}

.actions a:last-child {
  background:#25d366; /* واتساب */
}

/* BUTTONS */
.buttons {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:5px;
  margin-top:10px;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.call {background:#2196f3;}
.appointment {background:#ff9800;}
.visit {background:#9c27b0;}
.deal {background:#4caf50;}
.reject {background:#f44336;}
.pending {background:#607d8b;}
/* 🔥 INPUT احترافي */
.input-group {
  margin-bottom:12px;
}

.input-label {
  font-size:12px;
  color:#777;
  margin-bottom:4px;
}

.input-field {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  background:#f9f9f9;
  font-size:14px;
  transition:0.2s;
}

.input-field:focus {
  border-color:#0f9d58;
  background:white;
  outline:none;
  box-shadow:0 0 0 2px rgba(15,157,88,0.2);

}
.back-btn {
  position:absolute;
  right:10px;
  top:10px;
  width:40px;
  height:40px;
  background:white;
  border:none;
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  transition:0.2s;
}

.back-btn:active {
  transform:scale(0.9);
}

.arrow {
  border: solid #0f9d58;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 6px;
  transform: rotate(135deg);
}
</style>
</head>


<header style="position:relative">

<!-- زر الرجوع -->
<button onclick="goBack()" class="back-btn">
  <span class="arrow"></span>
</button>

📚 تفاصيل المدرسة

<button onclick="toggleEdit()" id="editBtn" style="
position:absolute;
left:10px;
top:10px;
background:white;
color:#0f9d58;
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
">
✏️
</button>

</header>

<div class="container" id="content"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, onValue, update, push } 
from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "firoz-system.firebaseapp.com",
  databaseURL: "https://firoz-system-default-rtdb.firebaseio.com",
  projectId: "firoz-system"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

const refSchool = ref(db,'schools/'+id);
let editMode = false;
let currentData = {};
function render(){

  const s = currentData;

 const field = (id, label, value) => {
  return editMode
    ? `
      <div class="input-group">
        <div class="input-label">${label}</div>
        <input class="input-field" id="${id}" value="${value || ''}">
      </div>
    `
    : `
      <div class="row"><b>${label}:</b> ${value || "-"}</div>
    `;
};

  document.getElementById("content").innerHTML = `

  <div class="card">
    <div class="section-title">📌 المعلومات</div>
${field("nameInput","📛 اسم المدرسة", s.name)}
${field("codeInput","🔢 الكود", s.code)}
${field("phone1Input","📞 رقم 1", s.phone1)}
${field("phone2Input","📞 رقم 2", s.phone2)}
${field("phone3Input","📞 رقم 3", s.phone3)}
${field("managerInput","👤 المسؤول", s.manager)}
${field("studentsInput","👥 عدد الطلاب", s.students)}
${field("teamInput","🏢 الفريق", s.team)}
${field("addressInput","📍 العنوان", s.address)}
${field("locationInput","🌍 الموقع", s.location)}

    ${editMode ? `
<button onclick="saveAll()" style="
background:#0f9d58;
margin-top:10px;
width:100%;
padding:12px;
font-size:15px;
font-weight:bold;
border-radius:10px;
">
💾 حفظ التعديلات
</button>
<button onclick="cancelEdit()" style="
background:#777;
margin-top:5px;
width:100%;
padding:10px;
border-radius:10px;
">
❌ إلغاء
</button>
    ` : ""}
  </div>

  <div class="card">
    <textarea id="noteInput" placeholder="ملاحظة..."></textarea>
<div class="actions">

<a href="tel:${s.phone1 || s.phone}">
    📞 اتصال
  </a>

 <a href="https://wa.me/964${(s.phone1 || s.phone || '').replace(/^0/,'')}" target="_blank" class="whatsapp-action">
  💬 واتساب
</a>

  <a href="${s.location || '#'}" target="_blank" style="background:#ff9800">
    🌍 الموقع
  </a>

</div>

</div>
  <div class="buttons">
  <button class="call" onclick="setStatus('called')">اتصال</button>
  <button class="appointment" onclick="setStatus('appointment')">موعد</button>
  <button class="visit" onclick="setStatus('visited')">زيارة</button>
  <button class="deal" onclick="setStatus('deal')">اتفاق</button>
  <button class="reject" onclick="setStatus('reject')">رفض</button>
  <button class="pending" onclick="setStatus('pending')">انتظار</button>
</div>
  </div>

<div class="card">
  <div class="section-title">📜 السجل</div>
  <div id="history"></div>
</div>
  `;
  let historyHtml = "";

if(s.history){
  Object.values(s.history).reverse().forEach(h=>{
    historyHtml += `<div class="row">• ${h.action} (${h.note || "-"}) - ${h.time}</div>`;
  });
}

const el = document.getElementById("history");
if(el) el.innerHTML = historyHtml;
}
onValue(refSchool,(snap)=>{
  currentData = snap.val();
  if(!currentData) return;

  render();
});


// تغيير الحالة
window.setStatus = function(status){

  const note = document.getElementById("noteInput").value;

  update(ref(db,'schools/'+id),{
    status: status
  });

  push(ref(db,'schools/'+id+'/history'),{
    action: translate(status),
    note: note,
    time: new Date().toLocaleString()
  });

  document.getElementById("noteInput").value = "";
}

// ترجمة
function translate(s){
  if(s==="new") return "جديدة";
  if(s==="called") return "تم الاتصال";
  if(s==="appointment") return "موعد";
  if(s==="visited") return "تمت الزيارة";
  if(s==="deal") return "اتفاق";
  if(s==="reject") return "مرفوض";
  if(s==="pending") return "قيد الانتظار";
  return s;
}
window.saveAll = function(){

  update(ref(db,'schools/'+id),{

    name: document.getElementById("nameInput").value,
    code: document.getElementById("codeInput").value,
phone1: document.getElementById("phone1Input").value,
phone2: document.getElementById("phone2Input").value,
phone3: document.getElementById("phone3Input").value,
    manager: document.getElementById("managerInput").value,
    students: document.getElementById("studentsInput").value,
    team: document.getElementById("teamInput").value,
    address: document.getElementById("addressInput").value,
    location: document.getElementById("locationInput").value,

  });

  editMode = false;

  // 🔥 يرجع زر القلم
  const btn = document.getElementById("editBtn");
  btn.innerText = "✏️";

  render();

}
window.toggleEdit = function(){

  editMode = !editMode; // 🔥 يقلب الوضع

  const btn = document.getElementById("editBtn");

  if(btn){
    btn.innerText = editMode ? "❌" : "✏️";
  }

  render();
}
window.cancelEdit = function(){
  editMode = false;
  render();
}
window.goBack = function(){
  location.href = "schools.html";
}
</script>

</body>
</html>
