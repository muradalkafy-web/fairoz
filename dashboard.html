<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Tahoma;
  background: linear-gradient(135deg,#e8f5e9,#f4f7f6);
}

/* HEADER */
header {
  background: linear-gradient(135deg,#0f9d58,#4caf50);
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background: linear-gradient(135deg,#d4edda,#a8e6a3);
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  cursor:pointer;
  transition: all 0.3s ease;
  position:relative;
  overflow:hidden;
}

/* لمعة خفيفة */
.card::before {
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
  transition:0.5s;
}

.card:hover::before {
  left:100%;
}

/* حركة hover */
.card:hover {
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

/* ICON */
.icon {
  font-size:35px;
  margin-bottom:10px;
}

/* TITLE */
.title {
  font-size:17px;
  font-weight:bold;
  color:#1b5e20;
}
</style>
</head>

<body>

<header>
📚 Dashboard - نظام فيروز
</header>

<div class="container">

<div class="card" onclick="go('schools.html')">
    <div class="icon">📚</div>
    <div class="title">إدارة المدارس</div>
  </div>

  <div class="card" onclick="go('add-school.html')">
    <div class="icon">➕</div>
    <div class="title">إضافة مدرسة</div>
  </div>

<div class="card" onclick="go('stats.html')">
  <div class="icon">📊</div>
  <div class="title">الإحصائيات</div>
</div>
<div class="card" onclick="go('users.html')">
  <div class="icon">👥</div>
  <div class="title">إدارة المستخدمين</div>
</div>
  <div class="card" onclick="logout()">
    <div class="icon">🚪</div>
    <div class="title">تسجيل خروج</div>
  </div>

</div>

<script>

// حماية الصفحة
if(!localStorage.getItem("user")){
  location.href="index.html";
}

function go(page){
  location.href = page;
}

function logout(){
  localStorage.removeItem("user");
  location.href="index.html";
}

</script>

</body>
</html>
